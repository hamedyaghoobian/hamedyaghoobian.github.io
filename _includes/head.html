<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YWJ7LC7EX8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-YWJ7LC7EX8');
  </script>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | escape }}</title>
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  {%- feed_meta -%}
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'DM Serif Display', serif;
    }

    .education-item,
    .contact-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    [data-theme="dark"] a:not(.orbit-icon) {
      color: #63b3ed;
    }

    [data-theme="dark"] a:not(.orbit-icon):hover {
      color: #90cdf4;
    }

    [data-theme="dark"] .site-title,
    [data-theme="dark"] .site-nav .page-link {
      color: #f7fafc;
    }

    [data-theme="dark"] .site-nav .page-link:hover {
      color: #90cdf4;
    }

    [data-theme="dark"] #theme-toggle {
      filter: drop-shadow(0 0 4px rgb(255, 255, 255, .7));
    }
  </style>
  <script>
    // Single source of truth: apply theme by class + data-theme together
    function applyTheme(isDark) {
      document.body.classList.toggle('dark', isDark);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    }

    function toggle() {
      document.body.classList.add('animation-ready');
      const goingDark = !document.body.classList.contains('dark');
      applyTheme(goingDark);
      localStorage.setItem('theme', goingDark ? 'dark' : 'light');
    }

    function setTheme(theme) {
      applyTheme(theme === 'dark');
      localStorage.setItem('theme', theme);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'light';
      setTheme(savedTheme);

      // Wire up pill button
      const pill = document.getElementById('theme-pill');
      if (pill) pill.addEventListener('click', toggle);
    });

    // Space-bar shortcut
    document.addEventListener('keydown', function (event) {
      if (event.keyCode === 32) {
        event.preventDefault();
        toggle();
      }
    });
  </script>
</head>
